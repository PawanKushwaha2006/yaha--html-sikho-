function shuffleArray(array) {
  let arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let questions = [];
for(let i=0;i<1000;i++){
  let b = baseQuestions[i % baseQuestions.length];
  let optsWithIndex = [
    {text: b[1], isCorrect: b[5] === 0},
    {text: b[2], isCorrect: b[5] === 1},
    {text: b[3], isCorrect: b[5] === 2},
    {text: b[4], isCorrect: b[5] === 3}
  ];
  let shuffled = shuffleArray(optsWithIndex);
  let newAnsIndex = shuffled.findIndex(item => item.isCorrect);
  questions.push({
    q: b[0],
    opts: shuffled.map(item => item.text),
    ans: newAnsIndex,
    diff: b[6]
  });
}

questions = shuffleArray(questions);

let i=0, score=0, correct=0, wrong=0;

function startQuiz(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQ();
}

function loadQ(){
  let q = questions[i];
  // YAHAN CHANGE KIYA: Q1, Q2 jaisa number question ke saath
  document.getElementById("question").innerText = `${i+1}. ${q.q}`;

  let progress = ((i+1)/questions.length)*100;
  document.getElementById("progressFill").style.width = progress + "%";

  let html="";
  q.opts.forEach((opt,index)=>{
    html += `<div class="option" onclick="check(${index})">${opt}</div>`;
  });
  document.getElementById("options").innerHTML = html;
  window.scrollTo(0,0);
}

function check(ans){
  let q = questions[i];
  let opts = document.querySelectorAll(".option");
  opts.forEach(o=>o.style.pointerEvents="none");
  let plus = q.diff=="easy"?5 : q.diff=="medium"?10 : 20;
  let minus = q.diff=="easy"?2 : q.diff=="medium"?5 : 10;

  if(ans === q.ans){
    opts[ans].classList.add("correct");
    score += plus;
    correct++;
  } else {
    opts[ans].classList.add("wrong");
    opts[q.ans].classList.add("correct");
    score -= minus;
    wrong++;
  }

  const scoreEl = document.getElementById("score");
  scoreEl.innerText = score;
  scoreEl.classList.toggle("negative", score < 0);

  document.getElementById("correct").innerText = correct;
  document.getElementById("wrong").innerText = wrong;

  setTimeout(()=>{
    i++;
    if(i >= questions.length){
      showResult();
    } else {
      loadQ();
    }
  },900);
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  let percent = Math.round((correct/questions.length)*100);
  let msg = percent >= 80? "🏆 Expert Level!" : percent >= 60? "🔥 Good Job!" : percent >= 40? "💪 Practice More" : "📚 Keep Learning";
  document.getElementById("final").innerHTML =
    `${msg}<br><br>Total Score: <strong>${score}</strong><br>Correct: <strong>${correct}/${questions.length}</strong><br>Wrong: <strong>${wrong}</strong><br>Accuracy: <strong>${percent}%</strong>`;
}
</script>

#result h2{font-size:1.8rem;margin-bottom:15px;background:linear-gradient(90deg, #38bdf8, #818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#final{font-size:1.1rem;margin:20px 0;line-height:1.8;color:#cbd5e1}
#start{text-align:center;padding:30px 0}
#start button{font-size:18px;padding:18px}
.badge{display:inline-block;background:rgba(56,189,248,0.2);color:#38bdf8;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:15px}
@media (max-width:480px){
.container{padding:20px 15px}
h1{font-size:1.5rem}
#question{font-size:1.05rem}
.option{font-size:14px;padding:14px}
.stats{gap:5px;padding:12px 8px}
.stats div span{font-size:16px}
}
</style>
</head>
<body>
<div class="container">
<h1>HTML Quiz 1000+</h1>

<div id="start">
<div class="badge">⚡ 1000 Questions</div>
<p style="color:#94a3b8;margin-bottom:25px;line-height:1.6">The ultimate HTML mega test. 30 seconds per question. Negative marking is on.</p>
<button onclick="startQuiz()">🚀 Start Quiz</button>
</div>

<div id="quiz" class="hidden">
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>
<div class="stats">
<div>Score<span id="score">0</span></div>
<div>Correct<span id="correct">0</span></div>
<div>Wrong<span id="wrong">0</span></div>
<div>Time<span id="timer">30</span></div>
</div>
<h3 id="question"></h3>
<div id="options"></div>
</div>

<div id="result" class="hidden">
<h2>🎉 Quiz Complete!</h2>
<p id="final"></p>
<button onclick="location.reload()">🔄 Play Again</button>
</div>
</div>

<script>
const baseQuestions = [
["What is the full form of HTML?","HyperText Markup Language","HighText Machine Language","HyperTabular Markup Language","None",0,"easy"],
["Who created HTML?","Tim Berners-Lee","Brendan Eich","James Gosling","Dennis Ritchie",0,"easy"],
["Which tag is used for paragraphs?","&lt;p&gt;","&lt;para&gt;","&lt;pg&gt;","&lt;text&gt;",0,"easy"],
["Which tag is used to create a link?","&lt;a&gt;","&lt;link&gt;","&lt;href&gt;","&lt;url&gt;",0,"easy"],
["Which tag is used to add an image?","&lt;img&gt;","&lt;image&gt;","&lt;pic&gt;","&lt;src&gt;",0,"easy"],
["Which is the largest heading tag?","&lt;h1&gt;","&lt;h6&gt;","&lt;head&gt;","&lt;header&gt;",0,"easy"],
["Which tag is used for a line break?","&lt;br&gt;","&lt;lb&gt;","&lt;break&gt;","&lt;newline&gt;",0,"easy"],
["Which tag creates an unordered list?","&lt;ul&gt;","&lt;list&gt;","&lt;ol&gt;","&lt;li&gt;",0,"easy"],
["Which tag defines a table row?","&lt;tr&gt;","&lt;td&gt;","&lt;th&gt;","&lt;table&gt;",0,"easy"],
["Which tag is used to create a form?","&lt;form&gt;","&lt;input&gt;","&lt;get&gt;","&lt;post&gt;",0,"easy"],
["What does input type='email' do?","Validates email format","Hides password","Accepts numbers","Provides date",0,"medium"],
["Which tag is used for a dropdown?","&lt;select&gt;","&lt;dropdown&gt;","&lt;option&gt;","&lt;list&gt;",0,"medium"],
["How do you create a checkbox?","type='checkbox'","type='check'","type='box'","&lt;checkbox&gt;",0,"medium"],
["Which tag plays video?","&lt;video&gt;","&lt;media&gt;","&lt;movie&gt;","&lt;mp4&gt;",0,"medium"],
["What is the canvas element used for?","Drawing graphics","Playing video","Playing audio","Writing text",0,"hard"],
["Which is a semantic tag?","&lt;article&gt;","&lt;div&gt;","&lt;span&gt;","&lt;b&gt;",0,"medium"],
["Which is a new input type in HTML5?","date","text","password","radio",0,"medium"],
["Where are meta tags written?","Inside &lt;head&gt;","Inside &lt;body&gt;","Inside &lt;html&gt;","Anywhere",0,"easy"],
["How do you write a comment?","&lt;!-- comment --&gt;","// comment","/* comment */","# comment",0,"easy"],
["What does the required attribute do?","Field cannot be left empty","Hides the field","Disables the field","Nothing",0,"medium"],
["What is LocalStorage?","Store data in browser","Data on server","Delete cookies","Clear cache",0,"hard"],
["What is WebSocket?","2-way communication","1-way","No connection","Database",0,"hard"],
["What is the full form of SVG?","Scalable Vector Graphics","Simple Vector","Super Video","None",0,"hard"],
["What is an attribute?","Extra info for a tag","New tag","CSS property","JS function",0,"easy"],
["Why do we write <!DOCTYPE html>?","To tell browser it's HTML5","To link CSS","To run JS","To set title",0,"medium"],
["Which tag creates a button?","&lt;button&gt;","&lt;btn&gt;","&lt;input type='button'&gt;","Both A & C",3,"easy"],
["Which tag makes text bold?","&lt;b&gt;","&lt;bold&gt;","&lt;strong&gt;","Both A & C",3,"easy"],
["Which tag is used for italic text?","&lt;i&gt;","&lt;italic&gt;","&lt;em&gt;","Both A & C",3,"easy"],
["Which tag underlines text?","&lt;u&gt;","&lt;underline&gt;","&lt;line&gt;","&lt;ins&gt;",0,"easy"],
["Which tag creates a horizontal line?","&lt;hr&gt;","&lt;line&gt;","&lt;h-line&gt;","&lt;border&gt;",0,"easy"],
["Which tag defines a table data cell?","&lt;td&gt;","&lt;tr&gt;","&lt;th&gt;","&lt;cell&gt;",0,"easy"],
["Which tag defines a table header cell?","&lt;th&gt;","&lt;td&gt;","&lt;head&gt;","&lt;header&gt;",0,"easy"],
["What is textarea used for?","Multi-line text input","Single line","Password","Number",0,"medium"],
["How to group radio buttons?","Same name attribute","Same id","Same class","Same value",0,"medium"],
["Which tag links CSS?","&lt;link&gt;","&lt;style&gt;","&lt;css&gt;","&lt;script&gt;",0,"medium"],
["Which tag adds JavaScript?","&lt;script&gt;","&lt;js&gt;","&lt;javascript&gt;","&lt;code&gt;",0,"easy"],
["What is iframe used for?","Embed another website","Show image","Play video","Create link",0,"hard"],
["Which tag plays audio?","&lt;audio&gt;","&lt;sound&gt;","&lt;music&gt;","&lt;mp3&gt;",0,"medium"],
["What does placeholder attribute do?","Shows hint text in input","Sets value","Gives name","Specifies type",0,"medium"],
["What is a div tag?","Block container","Inline element","Text tag","Form tag",0,"easy"]
];

function shuffleArray(array) {
  let arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let questions = [];
for(let i=0;i<1000;i++){
  let b = baseQuestions[i % baseQuestions.length];
  let optsWithIndex = [
    {text: b[1], isCorrect: b[5] === 0},
    {text: b[2], isCorrect: b[5] === 1},
    {text: b[3], isCorrect: b[5] === 2},
    {text: b[4], isCorrect: b[5] === 3}
  ];
  let shuffled = shuffleArray(optsWithIndex);
  let newAnsIndex = shuffled.findIndex(item => item.isCorrect);
  questions.push({
    q: b[0],
    opts: shuffled.map(item => item.text),
    ans: newAnsIndex,
    diff: b[6]
  });
}

questions = shuffleArray(questions);

let i=0, score=0, correct=0, wrong=0, timeLeft=30, timerInterval;

function startQuiz(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQ();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft = 30;
  const timerEl = document.getElementById("timer");
  timerEl.innerText = timeLeft;
  timerEl.classList.remove("danger");

  timerInterval = setInterval(()=>{
    timeLeft--;
    timerEl.innerText = timeLeft;

    if(timeLeft <= 10){
      timerEl.classList.add("danger");
    }

    if(timeLeft <= 0){
      clearInterval(timerInterval);
      timeUp();
    }
  },1000);
}

function timeUp(){
  let q = questions[i];
  let opts = document.querySelectorAll(".option");
  opts.forEach(o=>o.style.pointerEvents="none");
  opts[q.ans].classList.add("correct");

  let minus = q.diff=="easy"?2 : q.diff=="medium"?5 : 10;
  score -= minus;
  wrong++;

  const scoreEl = document.getElementById("score");
  scoreEl.innerText = score;
  scoreEl.classList.toggle("negative", score < 0);
  document.getElementById("correct").innerText = correct;
  document.getElementById("wrong").innerText = wrong;

  setTimeout(()=>{
    i++;
    if(i >= questions.length){
      showResult();
    } else {
      loadQ();
    }
  },900);
}

function loadQ(){
  let q = questions[i];
  document.getElementById("question").innerText = `${i+1}. ${q.q}`;

  let progress = ((i+1)/questions.length)*100;
  document.getElementById("progressFill").style.width = progress + "%";

  let html="";
  q.opts.forEach((opt,index)=>{
    html += `<div class="option" onclick="check(${index})">${opt}</div>`;
  });
  document.getElementById("options").innerHTML = html;
  window.scrollTo(0,0);

  startTimer();
}

function check(ans){
  clearInterval(timerInterval);
  let q = questions[i];
  let opts = document.querySelectorAll(".option");
  opts.forEach(o=>o.style.pointerEvents="none");
  let plus = q.diff=="easy"?5 : q.diff=="medium"?10 : 20;
  let minus = q.diff=="easy"?2 : q.diff=="medium"?5 : 10;

  if(ans === q.ans){
    opts[ans].classList.add("correct");
    score += plus;
    correct++;
  } else {
    opts[ans].classList.add("wrong");
    opts[q.ans].classList.add("correct");
    score -= minus;
    wrong++;
  }

  const scoreEl = document.getElementById("score");
  scoreEl.innerText = score;
  scoreEl.classList.toggle("negative", score < 0);

  document.getElementById("correct").innerText = correct;
  document.getElementById("wrong").innerText = wrong;

  setTimeout(()=>{
    i++;
    if(i >= questions.length){
      showResult();
    } else {
      loadQ();
    }
  },900);
}

function showResult(){
  clearInterval(timerInterval);
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  let percent = Math.round((correct/questions.length)*100);
  let msg = percent >= 80? "🏆 Expert Level!" : percent >= 60? "🔥 Good Job!" : percent >= 40? "💪 Practice More" : "📚 Keep Learning";
  document.getElementById("final").innerHTML =
    `${msg}<br><br>Total Score: <strong>${score}</strong><br>Correct: <strong>${correct}/${questions.length}</strong><br>Wrong: <strong>${wrong}</strong><br>Accuracy: <strong>${percent}%</strong>`;
}
</script>
</body>
</html>
