<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:15px}
  .container{max-width:450px;width:100%;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:25px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    h1{color:#58a6ff;text-align:center;margin-bottom:20px;font-size:26px}
    label{display:block;margin:15px 0 8px;color:#f0f6fc;font-weight:600;font-size:15px}
    input{width:100%;background:#0d1117;color:#c9d1d9;border:2px solid #30363d;border-radius:8px;padding:12px;font-size:16px;outline:none}
    input:focus{border-color:#1f6feb}
    button{width:100%;background:#238636;color:#fff;border:none;padding:14px;border-radius:8px;font-weight:600;font-size:16px;margin-top:20px;cursor:pointer;transition:all 0.2s}
    button:hover{background:#2ea043}
    button:active{transform:scale(.98)}
  .result{background:#0d1117;border:2px solid #30363d;border-radius:8px;padding:20px;margin-top:20px;display:none}
  .result.show{display:block;animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .result h3{color:#58a6ff;margin-bottom:15px;text-align:center}
  .age-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:15px}
  .age-box{background:#21262d;border-radius:8px;padding:15px;text-align:center}
  .age-box.num{font-size:32px;font-weight:700;color:#7ee787;display:block}
  .age-box.label{font-size:13px;color:#8b949e;margin-top:5px}
  .details{background:#21262d;border-radius:8px;padding:15px;margin-top:12px}
  .details p{margin:8px 0;font-size:14px;display:flex;justify-content:space-between}
  .details.val{color:#58a6ff;font-weight:600}
  .next-bday{background:#1f6feb;color:#fff;border-radius:8px;padding:12px;text-align:center;margin-top:12px;font-weight:600}
    @media(max-width:500px){
    .container{padding:20px}
      h1{font-size:22px}
    .age-box.num{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎂 Age Calculator</h1>

    <label>Date of Birth:</label>
    <input type="date" id="dob" max="">

    <button onclick="calculateAge()">Calculate Age</button>

    <div class="result" id="result">
      <h3>Your Age</h3>

      <div class="age-grid">
        <div class="age-box">
          <span class="num" id="years">0</span>
          <span class="label">Years</span>
        </div>
        <div class="age-box">
          <span class="num" id="months">0</span>
          <span class="label">Months</span>
        </div>
        <div class="age-box">
          <span class="num" id="days">0</span>
          <span class="label">Days</span>
        </div>
      </div>

      <div class="details">
        <p>Total Years: <span class="val" id="totalYears">0</span></p>
        <p>Total Months: <span class="val" id="totalMonths">0</span></p>
        <p>Total Weeks: <span class="val" id="totalWeeks">0</span></p>
        <p>Total Days: <span class="val" id="totalDays">0</span></p>
        <!--p>Total Hours: <span class="val" id="totalHours">0</span></p>
        <p>Total Minutes: <span class="val" id="totalMinutes">0</span></p-->
      </div>

      <div class="next-bday" id="nextBday">Next Birthday: --</div>
    </div>
  </div>

  <script>
    // Set max date = today
    document.getElementById('dob').max = new Date().toISOString().split('T')[0];

    function calculateAge(){
      let dobInput = document.getElementById('dob').value;
      if(!dobInput){
        alert('Please select your date of birth first!');
        return;
      }

      let dob = new Date(dobInput);
      let today = new Date();

      // Future date check
      if(dob > today){
        alert('You cannot be born in the future 😅');
        return;
      }

      // Calculate age
      let years = today.getFullYear() - dob.getFullYear();
      let months = today.getMonth() - dob.getMonth();
      let days = today.getDate() - dob.getDate();

      // Adjust if day/month is negative
      if(days < 0){
        months--;
        let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if(months < 0){
        years--;
        months += 12;
      }

      // Total calculations
      let totalDays = Math.floor((today - dob) / (1000 * 60 * 60 * 24));
      let totalWeeks = Math.floor(totalDays / 7);
      let totalMonths = years * 12 + months;
      let totalHours = totalDays * 24;
      let totalMinutes = totalHours * 60;

      // Next birthday
      let nextBday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
      if(nextBday < today){
        nextBday.setFullYear(today.getFullYear() + 1);
      }
      let daysLeft = Math.ceil((nextBday - today) / (1000 * 60 * 60 * 24));

      let bdayText = '';
      if(daysLeft === 0){
        bdayText = '🎉 Today is Your Birthday! Happy Birthday! 🎂';
      }else if(daysLeft === 1){
        bdayText = '🎂 Birthday Tomorrow!';
      }else{
        bdayText = `🎂 Next Birthday: In ${daysLeft} days`;
      }

      // Display results
      document.getElementById('years').innerText = years;
      document.getElementById('months').innerText = months;
      document.getElementById('days').innerText = days;
      document.getElementById('totalMonths').innerText = totalMonths.toLocaleString();
      document.getElementById('totalWeeks').innerText = totalWeeks.toLocaleString();
      document.getElementById('totalDays').innerText = totalDays.toLocaleString();
      document.getElementById('totalHours').innerText = totalHours.toLocaleString();
      document.getElementById('totalMinutes').innerText = totalMinutes.toLocaleString();
      document.getElementById('nextBday').innerText = bdayText;

      document.getElementById('result').classList.add('show');
    }

    // Enter key support
    document.getElementById('dob').addEventListener('keypress',e=>{
      if(e.key==='Enter') calculateAge();
    });
  </script>
</body>
</html>
