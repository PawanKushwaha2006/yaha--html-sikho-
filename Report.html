<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue - Pawan Math Solver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #f87171;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #dc2626;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>⚠️ Report an Issue</h1>
  
  <form action="https://formspree.io/f/xpqkkvoo" method="POST">
    <!-- Ye line batayegi ki ye Report hai, Suggestion nahi -->
    <input type="hidden" name="_subject" value="🚨 New Bug Report from Website">
    
    <input type="text" name="name" placeholder="Tera Naam" required>
    
    <input type="email" name="email" placeholder="Tera Email (optional)">
    
    <select name="issue_type" required>
      <option value="">Issue ka type select kar</option>
      <option value="Wrong Answer">Galat Answer aa raha hai</option>
      <option value="Website Bug">Website me bug hai</option>
      <option value="Not Loading">Website load nahi ho rahi</option>
      <option value="Other">Kuch aur problem</option>
    </select>
    
    <textarea name="message" rows="6" placeholder="Problem detail me yaha likh bhai... Kon se question me issue hai?" required></textarea>
    
    <!-- Spam se bachne ke liye -->
    <input type="text" name="_gotcha" style="display:none">
    
    <!-- Success page redirect -->
    <input type="hidden" name="_next" value="https://google.com">
    
    <button type="submit">Submit Report 🚨</button>
  </form>
  
  <a href="index.html" class="back">← Back to Home</a>
  
</body>
</html>
